<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Pedidos</title>
    <link rel="stylesheet" type="text/css" href="../css/admin.css">
    <script src="../js/admin.js" defer></script>
</head>
<body>
    <div class="admin-container">
        <div class="admin-card">
            <header class="admin-header">
                <div>
                    <h1>Panel Administrador</h1>
                    <p>Pedidos realizados por las cuentas</p>
                </div>
                <div class="admin-actions">
                    <a href="../index.html" class="admin-button">Volver a la tienda</a>
                    <button id="logout-btn" class="admin-button">Cerrar sesión</button>
                </div>
            </header>

            <section class="admin-summary">
                <p>Total de pedidos registrados: <strong id="order-count">0</strong></p>
                <p>Total de comentarios recibidos: <strong id="comment-count">0</strong></p>
            </section>

            <section id="orders-list" class="orders-list"></section>
            <section id="comments-list-section" class="orders-list" style="margin-top: 24px;"></section>
        </div>
    </div>
</body>
</html>
