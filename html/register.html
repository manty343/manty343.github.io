<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Cuenta - Imprenta</title>
    <link rel="stylesheet" type="text/css" href="../css/login.css">
    <script src="../js/register.js" defer></script>
</head>
<body>
    <div class="login-container">
        <a href="Formulario.html" class="back-link">← Volver al inicio de sesión</a>
        
        <div class="login-card">
            <div class="login-header">
                <h1>Crear cuenta</h1>
                <p>Registra un nuevo usuario</p>
            </div>

            <div class="error-message" id="error-message"></div>

            <form class="login-form" id="register-form">
                <div class="form-group">
                    <label for="name">Nombre completo</label>
                    <input type="text" id="name" name="name" placeholder="Tu nombre" required>
                </div>

                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="tu@correo.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirmar contraseña</label>
                    <input type="password" id="confirm-password" name="confirm-password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="login-btn">Registrar cuenta</button>
            </form>

            <div class="login-footer">
                ¿Ya tienes cuenta? <a href="Formulario.html">Iniciar sesión</a>
            </div>
        </div>
    </div>
</body>
</html>
